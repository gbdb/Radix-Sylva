name: Deploy Radix Sylva

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /srv/radixsylva
            git pull origin master
            sudo -u radix /srv/radixsylva/.venv/bin/pip install -r requirements.txt
            sudo -u radix /srv/radixsylva/.venv/bin/python manage.py migrate
            sudo -u radix /srv/radixsylva/.venv/bin/python manage.py collectstatic --noinput
            systemctl restart radix-gunicorn
